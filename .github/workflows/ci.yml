name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: basic check
        run: |
          echo "noted CI: validating repo"
          test -f README.md && echo "README present" || echo "no README (ok)"
          echo "ok"
